name: Deploy Mod Platform

on:
  # Allow a deployment to be started from the pipeline
  workflow_call:
    inputs:
      weblogic_version:
        description: Delius version
        type: string
        required: false
      weblogic_eis_version:
        description: Delius EIS version
        type: string
        required: false
      rbac_version:
        description: RBAC version
        type: string
        required: false
      environment:
        description: Environment
        type: string
        required: true
  # Allow a deployment to be started from the UI
  workflow_dispatch:
    inputs:
      weblogic_version:
        description: Delius version
        type: string
        required: false
      weblogic_eis_version:
        description: Delius EIS version
        type: string
        required: false
      rbac_version:
        description: RBAC version
        type: string
        required: false
      environment:
        description: Environment
        type: choice
        required: true
        options:
          - dev
      
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      id-token: write
      contents: read
    environment:
      name: ${{ inputs.environment }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: "arn:aws:iam::326912278139:role/modernisation-platform-oidc-cicd" # Remember to set acount ID as variable when you get the perms to add Github ENV vars
          role-session-name: "delius-releases-${{ github.run_number }}"
          aws-region: "eu-west-2"

      - name: Map environment name to Modernisation Platform account name
        id: modernisation_platform_environment
        run: |
          if [ "$environment" == 'dev' ];  then account_name='delius-core-development'; fi
          if [ "$environment" == 'test' ];     then account_name='delius-core-test'; fi
          if [ "$environment" == 'stage' ];    then account_name='delius-core-stage'; fi
          if [ "$environment" == 'pre-prod' ]; then account_name='delius-core-preproduction'; fi
          echo "account_name=${account_name}"
          echo "account_name=${account_name}" >> "$GITHUB_OUTPUT"
        env:
          environment: ${{ inputs.environment }}

      - name: Get currently running version of Weblogic/EIS
        id: get_current_version
        run: |
          for SERVICE in weblogic weblogic-eis; do
            IMAGE=$(aws ecs describe-task-definition \
              --task-definition "$(
                aws ecs describe-services \
                  --cluster "delius-core-${{ inputs.environment }}-cluster" \
                  --services "${{ inputs.environment }}-$SERVICE" \
                  --query 'services[0].taskDefinition' \
                  --output text
              )" \
              --query 'taskDefinition.containerDefinitions[0].image' \
              --output text)
            echo "Current ${SERVICE} version = ${IMAGE##*:}"
            echo "current_${SERVICE}_version=${IMAGE##*:}" >> "$GITHUB_OUTPUT"
          done

      - name: Set Image tag Terraform variables
        id: set_image_tag_vars
        run: |
          WEBLOGIC_IMAGE_TAG="${{ inputs.weblogic_version }}"
          if [[ -z "$WEBLOGIC_IMAGE_TAG" ]]; then
            WEBLOGIC_IMAGE_TAG="${{ steps.get_current_version.outputs.current_weblogic_version }}"
            echo "No Weblogic image tag supplied; using deployed version: $WEBLOGIC_IMAGE_TAG"
          else
            echo "Using supplied Weblogic image tag: $WEBLOGIC_IMAGE_TAG"
          fi

          WEBLOGIC_EIS_IMAGE_TAG="${{ inputs.weblogic_eis_version }}"
          if [[ -z "$WEBLOGIC_EIS_IMAGE_TAG" ]]; then
            WEBLOGIC_EIS_IMAGE_TAG="${{ steps.get_current_version.outputs.current_weblogic-eis_version }}"
            echo "No Weblogic EIS image tag supplied; using deployed version: $WEBLOGIC_EIS_IMAGE_TAG"
          else
            echo "Using supplied Weblogic EIS image tag: $WEBLOGIC_EIS_IMAGE_TAG"
          fi

          {
            echo "WEBLOGIC_IMAGE_TAG=$WEBLOGIC_IMAGE_TAG"
            echo "WEBLOGIC_EIS_IMAGE_TAG=$WEBLOGIC_EIS_IMAGE_TAG"
          } >> "$GITHUB_ENV"

      - name: Check if image version is in ECR
        id: check_image_version
        env:
          WEBLOGIC_IMAGE_TAG: ${{ steps.set_image_tag_vars.outputs.WEBLOGIC_IMAGE_TAG }}
          WEBLOGIC_EIS_IMAGE_TAG: ${{ steps.set_image_tag_vars.outputs.WEBLOGIC_EIS_IMAGE_TAG }}
        run: |
          echo "Checking if WebLogic image exists in ECR..."
          if ! aws ecr describe-images --registry-id "374269020027" --repository-name "delius-core-weblogic" --image-ids imageTag="$WEBLOGIC_IMAGE_TAG" >/dev/null 2>&1; then
            echo "Error: Image tag $WEBLOGIC_IMAGE_TAG for WebLogic does not exist in ECR repository delius-core-weblogic."
            exit 1
          fi

          echo "Checking if WebLogic EIS image exists in ECR..."
          if ! aws ecr describe-images --registry-id "374269020027" --repository-name "delius-core-weblogic" --image-ids imageTag="$WEBLOGIC_EIS_IMAGE_TAG" >/dev/null 2>&1; then
            echo "Error: Image tag $WEBLOGIC_EIS_IMAGE_TAG for WebLogic EIS does not exist in ECR repository delius-core-weblogic."
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "1.10.0"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        env:
          account_name: ${{ steps.modernisation_platform_environment.outputs.account_name }}
        run: |
          terraform init -backend-config=environments/${{ inputs.environment }}/backend.hcl
          echo "Running terraform workspace select -or-create ${{ env.account_name }}"
          terraform workspace select -or-create ${{ env.account_name }}

      - name: Terraform Plan
        id: plan
        env:
          WEBLOGIC_IMAGE_TAG: ${{ steps.set_image_tag_vars.outputs.WEBLOGIC_IMAGE_TAG }}
          WEBLOGIC_EIS_IMAGE_TAG: ${{ steps.set_image_tag_vars.outputs.WEBLOGIC_EIS_IMAGE_TAG }}
        working-directory: terraform
        run: |
          set -o pipefail
          exitcode=0
          tfargs="-detailed-exitcode"
          echo 'terraform plan -var-file="environments/${{ inputs.environment }}/terraform.tfvars" -var="weblogic_image_tag=${{ env.WEBLOGIC_IMAGE_TAG }}" -var="weblogic_eis_image_tag=${{ env.WEBLOGIC_EIS_IMAGE_TAG }}" $tfargs'
          terraform plan -var-file="environments/${{ inputs.environment }}/terraform.tfvars" -var="weblogic_image_tag=${{ env.WEBLOGIC_IMAGE_TAG }}" -var="weblogic_eis_image_tag=${{ env.WEBLOGIC_EIS_IMAGE_TAG }}" $tfargs | tee tfplan.txt || exitcode=$?
          echo "exitcode=${exitcode}"  # 0=clean plan, 1=error, 2=stuff in plan
          echo "exitcode=${exitcode}" >> $GITHUB_OUTPUT
          (( exitcode == 1 )) && exit 1 || exit 0

      # - name: Map Delius environment name to modernisation-platform environment name
